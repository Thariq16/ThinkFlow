<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="theme-color" content="#7C3AED">
  <meta name="mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ThinkFlow">

  <meta property="og:title" content="ThinkFlow — Task Intelligence">
  <meta property="og:description" content="Speak your thoughts. Get organized projects with AI.">
  <meta property="og:type" content="website">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ThinkFlow</title>
  <link rel="manifest" href="manifest.json">

  <style>

    body {
      margin: 0;
      padding: 0;
      background-color: #0D0D14;
      overflow: hidden;

</head>
